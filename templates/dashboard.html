<h1>Your files</h1>

<form action="/upload" method="POST" enctype="multipart/form-data">
  <input type="file" name="file">
  <button>Upload</button>
</form>

<ul>
  {% for file in files %}
    <li>
      {{ file.filename }}
      <a href="/download/{{ file.id }}">Download</a>
    </li>
  {% endfor %}
</ul>

<a href="/logout">Logout</a>
